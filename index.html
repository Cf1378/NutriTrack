// FONCTIONS UTILITAIRES
// ═══════════════════════════════════════════════════════════
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) { return new Date(d+"T12:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"short"}); }

function calcBMI(w,h) {
  const hm = parseFloat(h)/100;
  return hm>0 ? (parseFloat(w)/(hm*hm)).toFixed(1) : null;
}
function getBMICat(bmi) {
  const b = parseFloat(bmi);
  if (b < 18.5) return {label:"Insuffisance pondérale", color:"#3b82f6"};
  if (b < 25)   return {label:"Poids normal ✓",         color:"#22c55e"};
  if (b < 30)   return {label:"Surpoids",               color:"#f59e0b"};
  return              {label:"Obésité",                 color:"#ef4444"};
}
function calcTDEE({weight,height,age,sex,activity}) {
  if (!weight||!height||!age) return null;
  const w=parseFloat(weight), h=parseFloat(height), a=parseInt(age);
  const bmr = sex==="H" ? 10*w+6.25*h-5*a+5 : 10*w+6.25*h-5*a-161;
  return Math.round(bmr * parseFloat(activity));
}
function calcMealTotals(items) {
  return items.reduce((acc,i) => ({
    cal: acc.cal+(i.calories||0),
    p:   acc.p  +(i.macros?.p||0),
    c:   acc.c  +(i.macros?.c||0),
    f:   acc.f  +(i.macros?.f||0),
  }), {cal:0,p:0,c:0,f:0});
}
// Calcul MET : kcal = (MET / 60) × poids_kg × durée_min
function calcSportBurn(sports, weight) {
  const w = parseFloat(weight) || 70;
  return Math.round(sports.reduce((s,sp) => s + (sp.met/60)*w*sp.minutes, 0));
}

// ═══════════════════════════════════════════════════════════

function Card({children,sx={},glow=false}) {
  return <div style={{background:C.card,borderRadius:16,padding:"15px",
    border:`1px solid ${glow?C.accent+"55":C.border}`,
    boxShadow:glow?`0 0 24px ${C.accent}18`:"none",marginBottom:12,...sx}}>{children}</div>;
}
function ST({children}) {
  return <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",
    letterSpacing:"0.09em",marginBottom:10}}>{children}</div>;
}
function Inp({label,value,onChange,type="text",placeholder,unit,step,min}) {
  return <div style={{marginBottom:10}}>

      letterSpacing:"0.06em",marginBottom:4}}>{label}</div>}

}
function Sel({label,value,onChange,options}) {
  return <div style={{marginBottom:10}}>
    {label && <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",
      letterSpacing:"0.06em",marginBottom:4}}>{label}</div>}
    <select value={value} onChange={e=>onChange(e.target.value)}
      style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:9,
        color:C.text,padding:"9px 11px",fontSize:14,outline:"none",WebkitAppearance:"none"}}>
      {options.map(o=><option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}
    </select>
  </div>;
}
function Btn({children,onClick,color=C.accent,outline=false,small=false,full=false,disabled=false}) {
  return <button onClick={onClick} disabled={disabled} style={{
    background:outline?"transparent":color, color:outline?color:"#fff",
    border:`1.5px solid ${color}66`, borderRadius:9,
    padding:small?"6px 12px":"10px 16px", fontSize:small?12:14,
    fontWeight:600, cursor:disabled?"not-allowed":"pointer",
    opacity:disabled?0.4:1, width:full?"100%":undefined, letterSpacing:"0.02em",
  }}>{children}</button>;
}
function Alert({type,msg}) {
  const m={
    ok:  {bg:"#22c55e15",bd:"#22c55e44",c:C.green, icon:"✅"},
    warn:{bg:"#f9731615",bd:"#f9731644",c:C.orange,icon:"⚠️"},
    bad: {bg:"#ef444415",bd:"#ef444444",c:C.red,   icon:"🚨"},
    tip: {bg:"#6366f115",bd:"#6366f144",c:C.accent,icon:"💡"},
  }[type]||{};
  return <div style={{background:m.bg,border:`1px solid ${m.bd}`,borderRadius:11,
    padding:"10px 13px",display:"flex",alignItems:"flex-start",gap:8,
    color:m.c,fontSize:13,fontWeight:500,marginBottom:11}}>
    <span>{m.icon}</span><span>{msg}</span>
  </div>;
}
function Ring({value,max,size=90,stroke=9,color=C.accent,label,sub}) {
  const r=(size-stroke)/2, circ=2*Math.PI*r;
  const pct=Math.min(Math.max(value/max,0),1);
  return <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={circ-pct*circ} strokeLinecap="round"
        style={{transition:"stroke-dashoffset .6s ease"}}/>
    </svg>
    <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center"}}>
      <span style={{fontSize:14,fontWeight:800,color:C.text}}>{label}</span>
      {sub && <span style={{fontSize:9,color:C.muted}}>{sub}</span>}
    </div>
  </div>;
}
function MBar({label,value,max,color}) {
  const pct = Math.min((value/Math.max(max,1))*100,100);
  return <div style={{marginBottom:9}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
      <span style={{color:C.muted,fontWeight:500}}>{label}</span>
      <span style={{color,fontWeight:700}}>{Math.round(value)}g <span style={{color:C.muted,fontWeight:400}}>/ {max}g</span></span>
    </div>
    <div style={{height:5,background:C.border,borderRadius:99}}>
      <div style={{width:`${pct}%`,height:5,background:color,borderRadius:99,transition:"width .5s"}}/>
    </div>
  </div>;
}

      <ResponsiveContainer width="100%" height={130}>
        <LineChart data={wData} margin={{top:5,right:5,left:-28,bottom:0}}>
          <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
          <XAxis dataKey="date" tick={{fontSize:9,fill:C.muted}} tickFormatter={d=>d.slice(5)} interval="preserveStartEnd"/>
          <YAxis tick={{fontSize:9,fill:C.muted}} domain={["auto","auto"]} unit="kg"/>
          <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:11}}
            formatter={v=>[`${v} kg`,"Poids"]}/>
          <Line type="monotone" dataKey="weight" stroke={C.green} strokeWidth={2.5}
            dot={{fill:C.green,r:4,strokeWidth:0}} activeDot={{r:6}}/>
        </LineChart>
      </ResponsiveContainer>
    </Card>}
    {/* IMC */}
    {bmi && <Card>
      <ST>IMC</ST>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div>
          <div style={{fontSize:40,fontWeight:900,color:bmiC.color,lineHeight:1}}>{bmi}</div>
          <div style={{fontSize:14,color:bmiC.color,fontWeight:700,marginTop:4}}>{bmiC.label}</div>
        </div>
        <div style={{flex:1,fontSize:11}}>
          {[{r:"< 18.5",l:"Insuffisance",c:"#3b82f6"},{r:"18.5–24.9",l:"Normal ✓",c:C.green},
            {r:"25–29.9",l:"Surpoids",c:C.yellow},{r:"≥ 30",l:"Obésité",c:C.red}].map(b=>(
            <div key={b.l} style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{color:C.muted}}>{b.r}</span>
              <span style={{color:b.c,fontWeight:600}}>{b.l}</span>
            </div>
          ))}
        </div>
      </div>
    </Card>}
  </div>;
}

// PAGE : REPAS
// ═══════════════════════════════════════════════════════════
function PageMeals({meals,setMeals,midiT,soirT,remaining}) {
  const [slot,setSlot]=useState("midi");
  const [mode,setMode]=useState("db");
  const [cat,setCat]=useState("Toutes catégories");
  const [search,setSearch]=useState("");
  const [selFood,setSelFood]=useState("");
  const [qty,setQty]=useState("");
  const [mName,setMName]=useState("");
  const [mCal,setMCal]=useState("");
  const [mP,setMP]=useState("");
  const [mC,setMC]=useState("");
  const [mF,setMF]=useState("");
  const [showSuggest,setShowSuggest]=useState(false);

  const filtered=Object.keys(FOOD_DB).filter(k=>{
    const d=FOOD_DB[k];
    const catOk=cat==="Toutes catégories"||d.cat===cat;
    const searchOk=!search||k.toLowerCase().includes(search.toLowerCase());
    return catOk&&searchOk;
  });
  const slotT=slot==="midi"?midiT:soirT;
  const previewCal=selFood&&qty?Math.round(FOOD_DB[selFood]?.cal*parseFloat(qty)/100):null;
  const previewMacros=selFood&&qty?{
    p:Math.round(FOOD_DB[selFood]?.p*parseFloat(qty)/100),
    c:Math.round(FOOD_DB[selFood]?.c*parseFloat(qty)/100),
    f:Math.round(FOOD_DB[selFood]?.f*parseFloat(qty)/100),
  }:null;

  function addDb() {
    if(!selFood||!qty) return;
    const db=FOOD_DB[selFood]; const q=parseFloat(qty)/100;
    setMeals(prev=>({...prev,[slot]:[...prev[slot],{id:Date.now(),name:selFood,qty:parseFloat(qty),
      calories:Math.round(db.cal*q),macros:{p:Math.round(db.p*q),c:Math.round(db.c*q),f:Math.round(db.f*q)}}]}));
    setSelFood(""); setQty(""); setSearch("");
  }
  function addManual() {
    if(!mCal) return;
    setMeals(prev=>({...prev,[slot]:[...prev[slot],{id:Date.now(),name:mName||"Aliment",
      calories:parseInt(mCal),macros:{p:parseInt(mP)||0,c:parseInt(mC)||0,f:parseInt(mF)||0}}]}));
    setMName(""); setMCal(""); setMP(""); setMC(""); setMF("");
  }
  function remove(s,id){setMeals(prev=>({...prev,[s]:prev[s].filter(i=>i.id!==id)}));}

  return <div className="fade">
    {/* Slot toggle */}
    <div style={{display:"flex",gap:10,marginBottom:13}}>
      {[{id:"midi",l:"🍱 Déjeuner",t:midiT.cal},{id:"soir",l:"🌙 Dîner",t:soirT.cal}].map(s=>(
        <button key={s.id} onClick={()=>setSlot(s.id)} style={{
          flex:1,padding:"11px",borderRadius:13,cursor:"pointer",
          border:`1.5px solid ${slot===s.id?C.accent:C.border}`,
          background:slot===s.id?C.accent+"18":C.surface,
          color:slot===s.id?C.accent:C.muted,fontSize:13,fontWeight:700}}>
          {s.l}
          <div style={{fontSize:11,fontWeight:400,marginTop:2}}>{s.t} kcal</div>
        </button>
      ))}
    </div>
    {/* Mode toggle */}
    <div style={{display:"flex",gap:8,marginBottom:12}}>
      <Btn onClick={()=>setMode("db")}     small outline={mode!=="db"}     color={mode==="db"?C.accent:C.muted}>📋 Base alimentaire</Btn>
      <Btn onClick={()=>setMode("manual")} small outline={mode!=="manual"} color={mode==="manual"?C.accent:C.muted}>✏️ Manuel</Btn>
    </div>
    {/* DB mode */}
    {mode==="db" && <Card>
      <Sel label="Catégorie" value={cat} onChange={v=>{setCat(v);setSelFood(""); setSearch("");}}
        options={FOOD_CATS.map(c=>({value:c,label:c}))}/>
      <Inp label="Rechercher" value={search} onChange={v=>{setSearch(v);setSelFood("");}}
        placeholder="ex: poulet, pain…"/>
      {(search||(cat!=="Toutes catégories")) && filtered.length>0 && (
        <div style={{maxHeight:180,overflowY:"auto",borderRadius:9,border:`1px solid ${C.border}`,marginBottom:10}}>
          {filtered.slice(0,30).map(f=>(
            <div key={f} onClick={()=>{setSelFood(f);setSearch(f);}}
              style={{padding:"8px 11px",cursor:"pointer",
                background:selFood===f?C.accent+"22":"transparent",
                fontSize:13,color:selFood===f?C.accent:C.text,
                display:"flex",justifyContent:"space-between",alignItems:"center",
                borderBottom:`1px solid ${C.border}`}}>
              <span>{f}</span>
              <span style={{color:C.muted,fontSize:11}}>{FOOD_DB[f].cal} kcal/100g</span>
            </div>
          ))}
        </div>
      )}
      {selFood && <div style={{fontSize:12,color:C.accent,fontWeight:600,marginBottom:8,
        background:C.accent+"11",borderRadius:8,padding:"8px 10px"}}>
        ✓ {selFood} — {FOOD_DB[selFood]?.cal} kcal/100g &nbsp;|&nbsp;
        P:{FOOD_DB[selFood]?.p}g G:{FOOD_DB[selFood]?.c}g L:{FOOD_DB[selFood]?.f}g
      </div>}
      <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
        <div style={{flex:1}}><Inp label="Quantité" value={qty} onChange={setQty} type="number" placeholder="200" unit="g"/></div>
        {previewCal!==null && <div style={{marginBottom:10,padding:"9px 11px",background:C.accent+"18",
          borderRadius:9,fontSize:13,color:C.accent,fontWeight:800,whiteSpace:"nowrap",textAlign:"center"}}>
          {previewCal} kcal<br/>
          <span style={{fontSize:10,color:C.muted,fontWeight:400}}>P:{previewMacros.p} G:{previewMacros.c} L:{previewMacros.f}</span>
        </div>}
      </div>
      <Btn onClick={addDb} disabled={!selFood||!qty} full>＋ Ajouter à {slot==="midi"?"déjeuner":"dîner"}</Btn>
    </Card>}
    {/* Manual mode */}
    {mode==="manual" && <Card>
      <Inp label="Nom du plat" value={mName} onChange={setMName} placeholder="Sandwich jambon, pizza…"/>
      <Inp label="Calories" value={mCal} onChange={setMCal} type="number" placeholder="350" unit="kcal"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
        <Inp label="Protéines" value={mP} onChange={setMP} type="number" placeholder="0" unit="g"/>
        <Inp label="Glucides"  value={mC} onChange={setMC} type="number" placeholder="0" unit="g"/>
        <Inp label="Lipides"   value={mF} onChange={setMF} type="number" placeholder="0" unit="g"/>
      </div>
      <Btn onClick={addManual} disabled={!mCal} full>＋ Ajouter</Btn>
    </Card>}
    {/* Liste aliments */}
    {meals[slot].length>0 && <Card>
      <ST>{slot==="midi"?"🍱 Déjeuner":"🌙 Dîner"} — {slotT.cal} kcal total</ST>
      {meals[slot].map(item=>(
        <div key={item.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
          <div>
            <div style={{fontWeight:600,fontSize:14}}>{item.name}{item.qty?<span style={{color:C.muted,fontSize:12}}> ({item.qty}g)</span>:""}</div>
            <div style={{fontSize:11,color:C.muted}}>{item.macros.p}g P · {item.macros.c}g G · {item.macros.f}g L</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontWeight:800,color:"#a5b4fc"}}>{item.calories} kcal</span>
            <button onClick={()=>remove(slot,item.id)} style={{background:C.red+"22",border:"none",
              borderRadius:7,color:C.red,width:27,height:27,cursor:"pointer",fontSize:13}}>✕</button>
          </div>
        </div>
      ))}
    </Card>}
    {/* Suggestions */}
    <button onClick={()=>setShowSuggest(v=>!v)} style={{width:"100%",background:C.indigo+"15",
      border:`1px solid ${C.indigo}44`,borderRadius:13,padding:"12px",color:C.accent,
      fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:12}}>
      💡 {showSuggest?"Masquer les idées repas":`3 idées repas détaillées (≈${remaining>0?remaining:goalCal||1800} kcal restantes)`}
    </button>
    {showSuggest && MEAL_PLANS.map((plan,i)=>(
      <Card key={i} sx={{border:`1px solid ${C.indigo}44`}}>
        <div style={{fontWeight:800,fontSize:15,color:C.text,marginBottom:8}}>{plan.name}</div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:10}}>
          <span style={{background:C.accent+"22",color:C.accent,borderRadius:7,padding:"2px 9px",fontSize:12,fontWeight:700}}>{plan.cal} kcal</span>
          <span style={{background:"#a78bfa22",color:"#a78bfa",borderRadius:7,padding:"2px 9px",fontSize:12}}>P {plan.macros.p}g</span>
          <span style={{background:"#f59e0b22",color:"#f59e0b",borderRadius:7,padding:"2px 9px",fontSize:12}}>G {plan.macros.c}g</span>
          <span style={{background:"#22c55e22",color:"#22c55e",borderRadius:7,padding:"2px 9px",fontSize:12}}>L {plan.macros.f}g</span>
        </div>
        <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Ingrédients</div>
        {plan.ingredients.map((ing,j)=>(
          <div key={j} style={{display:"flex",gap:8,marginBottom:5,fontSize:13}}>
            <span style={{color:C.accent,fontWeight:700,minWidth:80}}>{ing.qty}</span>
            <div><span style={{fontWeight:600}}>{ing.item}</span><span style={{color:C.muted}}> — {ing.prep}</span></div>
          </div>
        ))}
        <div style={{marginTop:9,background:C.surface,borderRadius:9,padding:"9px 11px"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:3,textTransform:"uppercase",letterSpacing:"0.06em"}}>🍳 Cuisson</div>
          <div style={{fontSize:12,color:C.text,lineHeight:1.6}}>{plan.cuisson}</div>
        </div>
        {plan.tips && <div style={{marginTop:7,fontSize:12,color:C.yellow}}>💡 {plan.tips}</div>}
      </Card>
    ))}
  </div>;
}

// ═══════════════════════════════════════════════════════════
// PAGE : SPORT
// ═══════════════════════════════════════════════════════════
function PageSport({sport,setSport,profile}) {
  const [selSport,setSelSport]=useState(SPORT_DB[0].name);
  const [mins,setMins]=useState("");
  const w=parseFloat(profile.weight)||70;
  const sportObj=SPORT_DB.find(s=>s.name===selSport)||SPORT_DB[0];
  const previewCal=mins?Math.round((sportObj.met/60)*w*parseFloat(mins)):null;
  const calPerHour=Math.round((sportObj.met/60)*w*60);
  const total=calcSportBurn(sport,profile.weight);

  function add() {
    if(!mins) return;
    setSport(prev=>[...prev,{id:Date.now(),name:selSport,icon:sportObj.icon,
      met:sportObj.met,minutes:parseFloat(mins),burned:Math.round((sportObj.met/60)*w*parseFloat(mins))}]);
    setMins("");
  }
  return <div className="fade">
    {total>0 && <Alert type="ok" msg={`Bravo ! Tu as brûlé ${total} kcal aujourd'hui 🔥`}/>}
    <Card>
      <Sel label="Activité" value={selSport} onChange={setSelSport}
        options={SPORT_DB.map(s=>({value:s.name,label:`${s.icon} ${s.name}`}))}/>
      <div style={{background:C.surface,borderRadius:9,padding:"9px 11px",marginBottom:10,fontSize:12}}>
        <span style={{color:C.muted}}>MET {sportObj.met} · </span>
        <span style={{color:C.green,fontWeight:700}}>{calPerHour} kcal/h</span>
        <span style={{color:C.muted}}> pour {w} kg</span>
      </div>
      <Inp label="Durée" value={mins} onChange={setMins} type="number" placeholder="30" unit="min"/>
      {previewCal && <div style={{fontSize:15,color:C.green,fontWeight:800,marginBottom:10}}>
        ≈ {previewCal} kcal brûlées <span style={{fontSize:12,color:C.muted,fontWeight:400}}>pour {mins} min</span>
      </div>}
      <Btn onClick={add} disabled={!mins} color={C.green} full>＋ Ajouter cette activité</Btn>
    </Card>
    <div style={{background:C.card,borderRadius:12,padding:"11px 13px",border:`1px solid ${C.border}`,marginBottom:12,fontSize:12,color:C.muted}}>
      ℹ️ Formule : kcal = (MET ÷ 60) × poids × durée. Intensité moyenne, {w} kg.
    </div>
    {sport.length>0 && <Card>
      <ST>Sport du jour — 🔥 {total} kcal brûlées</ST>
      {sport.map(sp=>(
        <div key={sp.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
          <div>
            <div style={{fontWeight:600,fontSize:14}}>{sp.icon} {sp.name}</div>
            <div style={{fontSize:12,color:C.muted}}>{sp.minutes} min · MET {sp.met}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontWeight:800,color:C.green}}>-{sp.burned} kcal</span>
            <button onClick={()=>setSport(prev=>prev.filter(x=>x.id!==sp.id))}
              style={{background:C.red+"22",border:"none",borderRadius:7,color:C.red,
                width:27,height:27,cursor:"pointer",fontSize:13}}>✕</button>
          </div>
        </div>
      ))}
    </Card>}
  </div>;
}

// ═══════════════════════════════════════════════════════════
// PAGE : POIDS
// ═══════════════════════════════════════════════════════════
function PageWeight({weightLog,setWeightLog,profile}) {
  const [nw,setNw]=useState("");
  const bmi=nw&&profile.height?calcBMI(nw,profile.height):null;
  const last=weightLog.length>0?weightLog[weightLog.length-1].weight:null;
  const first=weightLog.length>0?weightLog[0].weight:null;
  const diff=last&&first&&weightLog.length>1?(last-first).toFixed(1):null;

  function save() {
    if(!nw) return;
    const t=today();
    setWeightLog(prev=>{
      const next=[...prev.filter(x=>x.date!==t),{date:t,weight:parseFloat(nw)}]
        .sort((a,b)=>a.date.localeCompare(b.date));
      LS.set("nt_weight_log",next); return next;
    }); setNw("");
  }
  return <div className="fade">
    {diff!==null && <Alert type={parseFloat(diff)<=0?"ok":"warn"}
      msg={`Depuis le début : ${parseFloat(diff)<=0?"":"+"} ${diff} kg — ${parseFloat(diff)<=0?"Bonne tendance 💪":"Tendance à la hausse"}`}/>}
    <Card>
      <ST>Enregistrer mon poids</ST>
      <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
        <div style={{flex:1}}><Inp label="Poids" value={nw} onChange={setNw} type="number" placeholder="75.5" unit="kg" step="0.1"/></div>
        {bmi && <div style={{marginBottom:10,padding:"9px 11px",background:C.accent+"18",
          borderRadius:9,fontSize:13,color:C.accent,fontWeight:800,whiteSpace:"nowrap",textAlign:"center"}}>
          IMC {bmi}<br/><span style={{fontSize:10,color:C.muted,fontWeight:400}}>{getBMICat(bmi).label}</span>
        </div>}
      </div>
      <Btn onClick={save} disabled={!nw} full color={C.green}>💾 Enregistrer</Btn>
    </Card>
    {weightLog.length>1 && <Card>
      <ST>Courbe de poids</ST>
      <ResponsiveContainer width="100%" height={170}>
        <LineChart data={weightLog} margin={{top:5,right:5,left:-28,bottom:0}}>
          <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
          <XAxis dataKey="date" tick={{fontSize:9,fill:C.muted}} tickFormatter={d=>d.slice(5)} interval="preserveStartEnd"/>
          <YAxis tick={{fontSize:9,fill:C.muted}} domain={["auto","auto"]} unit="kg"/>
          <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:12}}
            formatter={v=>[`${v} kg`,"Poids"]}/>
          <Line type="monotone" dataKey="weight" stroke={C.green} strokeWidth={2.5}
            dot={{fill:C.green,r:4,strokeWidth:0}} activeDot={{r:7,fill:C.accent}}/>
        </LineChart>
      </ResponsiveContainer>
    </Card>}
    {weightLog.length===1 && <Alert type="tip" msg="Reviens dans 2 jours pour voir l'évolution en graphique !"/>}
    {weightLog.length>0 && <Card>
      <ST>Historique</ST>
      {[...weightLog].reverse().slice(0,20).map((e,i,arr)=>{
        const prev=arr[i+1];
        const delta=prev?(e.weight-prev.weight).toFixed(1):null;
        return <div key={e.date} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
          padding:"6px 0",borderBottom:`1px solid ${C.border}`,fontSize:13}}>
          <span style={{color:C.muted}}>{fmtDate(e.date)}</span>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <span style={{fontWeight:700}}>{e.weight} kg</span>
            {delta!==null && <span style={{fontSize:11,fontWeight:700,
              color:parseFloat(delta)<=0?C.green:C.red}}>{parseFloat(delta)<=0?"":"+"}{delta}</span>}
            <button onClick={()=>setWeightLog(prev=>{
              const n=prev.filter(x=>x.date!==e.date);LS.set("nt_weight_log",n);return n;
            })} style={{background:C.red+"22",border:"none",borderRadius:6,color:C.red,
              width:24,height:24,cursor:"pointer",fontSize:12}}>✕</button>
          </div>
        </div>;
      })}
    </Card>}
  </div>;
}

// PAGE : PROFIL
// ═══════════════════════════════════════════════════════════
function PageProfile({profile,setProfile,tdee,deficit,goalCal}) {
  const [saved,setSaved]=useState(false);
  const bmi=profile.weight&&profile.height?calcBMI(profile.weight,profile.height):null;
  const bmiC=bmi?getBMICat(bmi):null;
  function up(k,v){setProfile(prev=>({...prev,[k]:v}));}
  function save(){LS.set("nt_profile",profile);setSaved(true);setTimeout(()=>setSaved(false),2200);}

  return <div className="fade">
    {saved && <Alert type="ok" msg="Profil sauvegardé !"/>}
    <Card>
      <ST>Mes informations</ST>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Inp label="Poids"  value={profile.weight} onChange={v=>up("weight",v)} type="number" unit="kg"  placeholder="75"/>
        <Inp label="Taille" value={profile.height} onChange={v=>up("height",v)} type="number" unit="cm"  placeholder="178"/>
        <Inp label="Âge"    value={profile.age}    onChange={v=>up("age",v)}    type="number" unit="ans" placeholder="30"/>
      </div>
      <Sel label="Sexe" value={profile.sex} onChange={v=>up("sex",v)}
        options={[{value:"H",label:"Homme"},{value:"F",label:"Femme"}]}/>
      <Sel label="Niveau d'activité" value={profile.activity} onChange={v=>up("activity",v)}
        options={ACTIVITY_LEVELS}/>
    </Card>
    <Card>
      <ST>Objectif calorique</ST>
      <Inp label="Déficit journalier" value={profile.deficit} onChange={v=>up("deficit",v)}
        type="number" unit="kcal/j" placeholder="300"/>
      <div style={{fontSize:11,color:C.muted,marginBottom:10}}>Ou imposer un objectif fixe (optionnel) :</div>
      <Inp label="Objectif manuel" value={profile.goalCal} onChange={v=>up("goalCal",v)}
        type="number" unit="kcal" placeholder="auto"/>
      <Btn onClick={save} color={C.green} full>💾 Sauvegarder</Btn>
    </Card>
    {tdee && <Card>
      <ST>Mes données calculées</ST>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[
          {l:"Métabolisme de base",v:Math.round(tdee/parseFloat(profile.activity)),u:"kcal",c:C.muted},
          {l:"Dépense totale (TDEE)",v:tdee,u:"kcal",c:"#a5b4fc"},
          {l:"Déficit appliqué",v:`-${deficit}`,u:"kcal",c:C.orange},
          {l:"Objectif final",v:goalCal,u:"kcal",c:C.green},
        ].map(s=>(
          <div key={s.l} style={{background:C.surface,borderRadius:11,padding:"11px 13px",border:`1px solid ${C.border}`}}>
            <div style={{fontSize:10,color:C.muted,marginBottom:3}}>{s.l}</div>
            <div style={{fontSize:20,fontWeight:900,color:s.c,lineHeight:1}}>{s.v}</div>
            <div style={{fontSize:10,color:C.muted}}>{s.u}</div>
          </div>
        ))}
      </div>
    </Card>}
    {bmi && <Card>
      <ST>IMC</ST>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div>
          <div style={{fontSize:44,fontWeight:900,color:bmiC.color,lineHeight:1}}>{bmi}</div>
          <div style={{fontSize:14,color:bmiC.color,fontWeight:700,marginTop:6}}>{bmiC.label}</div>
        </div>
        <Ring value={parseFloat(bmi)} max={40} size={78} stroke={8} color={bmiC.color} label={bmi}/>
      </div>
    </Card>}
    <Card sx={{border:`1px solid ${C.accent}33`,background:C.accent+"06"}}>
      <ST>📱 Installer sur iPhone</ST>
      {["1. Ouvrir cette page dans Safari (obligatoire)",
        "2. Appuyer sur le bouton Partager ↑ en bas",
        "3. Choisir « Sur l'écran d'accueil »",
        "4. Nommer l'app NutriTrack et confirmer ✓",
        "5. L'app s'ouvre en plein écran comme une vraie app !"
      ].map((s,i)=>(
        <div key={i} style={{fontSize:13,color:i===4?C.green:C.text,marginBottom:5,fontWeight:i===4?700:400}}>{s}</div>
      ))}
    </Card>
  </div>;
}

// ═══════════════════════════════════════════════════════════
// COMPOSANT PRINCIPAL
// ═══════════════════════════════════════════════════════════
function App() {
  const [tab,setTab]=useState("dash");
  const [profile,setProfile]=useState({weight:"",height:"",age:"",sex:"H",activity:"1.55",deficit:"300",goalCal:""});
  const [meals,setMeals]=useState({midi:[],soir:[]});
  const [sport,setSport]=useState([]);
  const [weightLog,setWeightLog]=useState([]);
  const [calHist,setCalHist]=useState([]);
  const [ready,setReady]=useState(false);

  // ── Chargement initial ──────────────────────────────────
  useEffect(()=>{
    const p=LS.get("nt_profile");
    const m=LS.get(`nt_meals_${today()}`);
    const s=LS.get(`nt_sport_${today()}`);
    const wl=LS.get("nt_weight_log");
    const ch=LS.get("nt_cal_history");
    if(p) setProfile(p);
    if(m) setMeals(m);
    if(s) setSport(s);
    if(wl) setWeightLog(wl);
    // Seeder l'historique calories si vide (pour afficher le graphique dès le départ)
    if(ch&&ch.length>0){
      setCalHist(ch);
    } else {
      const pp=p||{};
      const tdee0=calcTDEE({weight:pp.weight||75,height:pp.height||175,age:pp.age||30,sex:pp.sex||"H",activity:pp.activity||"1.55"});
      const goal0=parseInt(pp.goalCal)||((tdee0||1900)-parseInt(pp.deficit||300));
      const seed=[];
      for(let i=13;i>=1;i--){
        const d=new Date(); d.setDate(d.getDate()-i);
        const dd=d.toISOString().slice(0,10);
        const burn=Math.round(Math.random()*280);
        const net=goal0+Math.round((Math.random()-0.5)*320);
        seed.push({date:dd,consumed:net+burn,burned:burn,net});
      }
      setCalHist(seed); LS.set("nt_cal_history",seed);
    }
    setReady(true);
    document.getElementById("splash").style.display="none";
    document.getElementById("root").style.display="block";
  },[]);

  // ── Auto-sauvegarde ─────────────────────────────────────
  useEffect(()=>{if(ready) LS.set("nt_profile",profile);},[profile,ready]);
  useEffect(()=>{if(ready) LS.set(`nt_meals_${today()}`,meals);},[meals,ready]);
  useEffect(()=>{if(ready) LS.set(`nt_sport_${today()}`,sport);},[sport,ready]);

  // ── Mise à jour historique calories ────────────────────
  useEffect(()=>{
    if(!ready) return;
    const mT=calcMealTotals(meals.midi), sT=calcMealTotals(meals.soir);
    const consumed=mT.cal+sT.cal;
    const burned=calcSportBurn(sport,profile.weight);
    const net=consumed-burned;
    setCalHist(prev=>{
      const filtered=prev.filter(x=>x.date!==today());
      const next=[...filtered,{date:today(),consumed,burned,net}]
        .sort((a,b)=>a.date.localeCompare(b.date)).slice(-30);
      LS.set("nt_cal_history",next); return next;
    });
  },[meals,sport,ready]);

  // ── Valeurs dérivées ────────────────────────────────────
  const tdee=calcTDEE(profile);
  const deficit=parseInt(profile.deficit)||300;
  const goalCal=parseInt(profile.goalCal)||(tdee?tdee-deficit:2000);
  const midiT=calcMealTotals(meals.midi);
  const soirT=calcMealTotals(meals.soir);
  const sportBurn=calcSportBurn(sport,profile.weight);
  const consumed=midiT.cal+soirT.cal;
  const net=consumed-sportBurn;
  const remaining=goalCal-net;
  const allM={p:midiT.p+soirT.p, c:midiT.c+soirT.c, f:midiT.f+soirT.f};
  const w=parseFloat(profile.weight)||70;
  const macroTgt={p:Math.round(w*2), f:Math.round(w*1), c:Math.max(Math.round((goalCal-w*2*4-w*1*9)/4),50)};

  const NAV=[
    {id:"dash",  icon:"⚡",label:"Bilan"},
    {id:"meals", icon:"🍽️",label:"Repas"},
    {id:"sport", icon:"🏃",label:"Sport"},
    {id:"weight",icon:"📈",label:"Poids"},
    {id:"profile",icon:"⚙️",label:"Profil"},
  ];

  return <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column"}}>
    {/* Header */}
    <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"13px 16px 11px",
      position:"sticky",top:0,zIndex:99,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{fontSize:18,fontWeight:900,letterSpacing:"-0.04em"}}>
          ⚡ Nutri<span style={{color:C.accent}}>Track</span>
        </div>
        <div style={{fontSize:10,color:C.muted}}>
          {new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})}
        </div>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{fontSize:20,fontWeight:900,color:remaining>=0?C.green:C.red,lineHeight:1}}>
          {remaining>=0?`+${remaining}`:remaining}
        </div>
        <div style={{fontSize:10,color:C.muted}}>kcal restantes</div>
      </div>
    </div>
    {/* Contenu */}
    <div style={{flex:1,overflowY:"auto",padding:"13px 13px 85px"}}>
      {tab==="dash"    && <PageDash {...{consumed,sportBurn,net,goalCal,remaining,midiT,soirT,allM,macroTgt,calHist,weightLog,profile}}/>}
      {tab==="meals"   && <PageMeals {...{meals,setMeals,midiT,soirT,remaining,goalCal}}/>}
      {tab==="sport"   && <PageSport {...{sport,setSport,profile}}/>}
      {tab==="weight"  && <PageWeight {...{weightLog,setWeightLog,profile}}/>}
      {tab==="profile" && <PageProfile {...{profile,setProfile,tdee,deficit,goalCal}}/>}
    </div>
    {/* Navigation bas */}
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
      width:"100%",maxWidth:430,background:C.surface,borderTop:`1px solid ${C.border}`,
      display:"flex",paddingBottom:"env(safe-area-inset-bottom,6px)"}}>
      {NAV.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"9px 0 6px",
          background:"none",border:"none",cursor:"pointer",
          display:"flex",flexDirection:"column",alignItems:"center",gap:2,
          color:tab===t.id?C.accent:C.muted}}>
          <span style={{fontSize:19}}>{t.icon}</span>
          <span style={{fontSize:10,fontWeight:tab===t.id?700:400}}>{t.label}</span>
        </button>
      ))}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
