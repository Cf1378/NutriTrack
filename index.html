const LS={get:k=>{try{let v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}};
let state={tab:'dash',profile:{weight:'',height:'',age:'',sex:'H',activity:'1.55',deficit:'300',goalCal:''},meals:{midi:[],soir:[]},sport:[],weights:[],hist:[]};
function load(){state.profile=LS.get('nt_profile')||state.profile;state.meals=LS.get('nt_meals_'+today())||state.meals;state.sport=LS.get('nt_sport_'+today())||[];state.weights=LS.get('nt_weight_log')||[];state.hist=LS.get('nt_cal_history')||[];}
function save(){LS.set('nt_profile',state.profile);LS.set('nt_meals_'+today(),state.meals);LS.set('nt_sport_'+today(),state.sport);LS.set('nt_weight_log',state.weights);LS.set('nt_cal_history',state.hist);}
function totals(items){return items.reduce((a,i)=>({cal:a.cal+(i.calories||0),p:a.p+(i.macros?.p||0),c:a.c+(i.macros?.c||0),f:a.f+(i.macros?.f||0)}),{cal:0,p:0,c:0,f:0})}
function tdee(){let p=state.profile,w=+p.weight,h=+p.height,a=+p.age;if(!w||!h||!a)return null;let b=p.sex==='H'?10*w+6.25*h-5*a+5:10*w+6.25*h-5*a-161;return Math.round(b*(+p.activity||1.55));}
function sportBurn(){let w=+state.profile.weight||70;return Math.round(state.sport.reduce((s,x)=>s+(x.met/60)*w*x.minutes,0));}
function derived(){let mt=totals(state.meals.midi),st=totals(state.meals.soir),td=tdee(),goal=+state.profile.goalCal||(td?(td-(+state.profile.deficit||300)):2000),burn=sportBurn(),cons=mt.cal+st.cal,net=cons-burn;return {mt,st,goal,burn,cons,net,rem:goal-net,mac:{p:mt.p+st.p,c:mt.c+st.c,f:mt.f+st.f}};}
function bmi(){let w=+state.profile.weight,h=+state.profile.height/100;return w&&h?(w/(h*h)).toFixed(1):''}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function header(){let d=derived();return `<div class="head"><div><div class="brand">⚡ Nutri<span style="color:#818cf8">Track</span></div><div class="muted" style="font-size:10px">${new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</div></div><div style="text-align:right"><div style="font-size:20px;font-weight:900;color:${d.rem>=0?C.green:C.red};line-height:1">${d.rem>=0?'+'+d.rem:d.rem}</div><div class="muted" style="font-size:10px">kcal restantes</div></div></div>`}
function nav(){let tabs=[['dash','⚡','Bilan'],['meals','🍽️','Repas'],['sport','🏃','Sport'],['weight','📈','Poids'],['profile','⚙️','Profil']];return `<div class="nav">${tabs.map(t=>`<button onclick="go('${t[0]}')" class="${state.tab===t[0]?'active':''}"><span style="font-size:19px">${t[1]}</span><span style="font-size:10px;font-weight:${state.tab===t[0]?700:400}">${t[2]}</span></button>`).join('')}</div>`}
function bar(label,val,max,color){let pct=Math.min(val/Math.max(max,1)*100,100);return `<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span class="muted">${label}</span><b style="color:${color}">${Math.round(val)}g <span class="muted">/ ${max}g</span></b></div><div class="bar"><div style="width:${pct}%;background:${color}"></div></div></div>`}
function simpleChart(data,key,color){if(data.length<2)return '<div class="muted" style="font-size:12px">Pas encore assez de données.</div>';let vals=data.map(x=>+x[key]||0),min=Math.min(...vals),max=Math.max(...vals);if(max===min)max=min+1;let pts=data.map((x,i)=>`${i/(data.length-1)*100},${140-((x[key]-min)/(max-min))*120}`).join(' ');return `<svg viewBox="0 0 100 150" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" vector-effect="non-scaling-stroke"/><line x1="0" y1="140" x2="100" y2="140" stroke="#2d2d44" vector-effect="non-scaling-stroke"/></svg>`}
function pageDash(){let d=derived(),w=+state.profile.weight||70,macro={p:Math.round(w*2),f:Math.round(w),c:Math.max(Math.round((d.goal-w*2*4-w*9)/4),50)};return `<div class="fade">${d.rem<0?`<div class="alert bad">🚨 Dépassement de ${Math.abs(d.rem)} kcal</div>`:d.rem<150?`<div class="alert warn">⚠️ Plus que ${d.rem} kcal disponibles</div>`:`<div class="alert">✅ Déficit respecté — encore ${d.rem} kcal</div>`}<div class="card glow"><div class="grid2"><div><div class="muted" style="font-size:10px">Consommé</div><div style="font-size:28px;font-weight:900">${d.cons}</div><div class="muted" style="font-size:10px">kcal</div></div><div><div class="muted" style="font-size:10px">Sport 🔥</div><div style="font-size:28px;font-weight:900;color:#22c55e">-${d.burn}</div><div class="muted" style="font-size:10px">kcal</div></div><div><div class="muted" style="font-size:10px">Net</div><div style="font-size:22px;font-weight:900">${d.net}</div></div><div><div class="muted" style="font-size:10px">Objectif</div><div style="font-size:22px;font-weight:900;color:#64748b">${d.goal}</div></div></div></div><div class="card"><div class="st">Repas du jour</div><div class="grid2"><div class="pill"><div class="muted" style="font-size:12px">🍱 Déjeuner</div><div style="font-size:22px;font-weight:900">${d.mt.cal}</div><div class="muted" style="font-size:10px">${d.mt.p}g P · ${d.mt.c}g G · ${d.mt.f}g L</div></div><div class="pill"><div class="muted" style="font-size:12px">🌙 Dîner</div><div style="font-size:22px;font-weight:900">${d.st.cal}</div><div class="muted" style="font-size:10px">${d.st.p}g P · ${d.st.c}g G · ${d.st.f}g L</div></div></div></div><div class="card"><div class="st">Macronutriments</div>${bar('🥩 Protéines',d.mac.p,macro.p,'#a78bfa')}${bar('🌾 Glucides',d.mac.c,macro.c,'#f59e0b')}${bar('🧈 Lipides',d.mac.f,macro.f,'#22c55e')}</div><div class="card"><div class="st">Historique calories</div>${simpleChart(state.hist,'net','#818cf8')}</div>${bmi()?`<div class="card"><div class="st">IMC</div><div style="font-size:42px;font-weight:900;color:#22c55e">${bmi()}</div></div>`:''}</div>`}
let mealSlot='midi', mealMode='db';
function pageMeals(){let d=derived(),cats=['Toutes catégories',...new Set(Object.values(FOOD_DB).map(x=>x.cat||'Divers'))];return `<div class="fade"><div style="display:flex;gap:10px;margin:12px 13px"><button class="btn ${mealSlot==='midi'?'':'ghost'}" style="flex:1" onclick="mealSlot='midi';render()">🍱 Déjeuner<br><span style="font-size:11px">${d.mt.cal} kcal</span></button><button class="btn ${mealSlot==='soir'?'':'ghost'}" style="flex:1" onclick="mealSlot='soir';render()">🌙 Dîner<br><span style="font-size:11px">${d.st.cal} kcal</span></button></div><div class="card"><div style="display:flex;gap:8px;margin-bottom:10px"><button class="btn ${mealMode==='db'?'':'ghost'}" onclick="mealMode='db';render()">📋 Base</button><button class="btn ${mealMode==='manual'?'':'ghost'}" onclick="mealMode='manual';render()">✏️ Manuel</button></div>${mealMode==='db'?`<label>Catégorie</label><select id="cat" class="select">${cats.map(c=>`<option>${esc(c)}</option>`).join('')}</select><label>Rechercher</label><input id="search" class="input" placeholder="ex: poulet, pain…" oninput="filterFoods()"><div id="foods" class="list"></div><label>Quantité</label><input id="qty" class="input" type="number" placeholder="200"><button class="btn" style="width:100%;margin-top:10px" onclick="addFood()">＋ Ajouter</button>`:`<label>Nom</label><input id="mn" class="input" placeholder="Plat"><label>Calories</label><input id="mc" class="input" type="number" placeholder="350"><div class="grid3"><div><label>P</label><input id="mp" class="input" type="number"></div><div><label>G</label><input id="mg" class="input" type="number"></div><div><label>L</label><input id="ml" class="input" type="number"></div></div><button class="btn" style="width:100%;margin-top:10px" onclick="addManual()">＋ Ajouter</button>`}</div><div class="card"><div class="st">${mealSlot==='midi'?'🍱 Déjeuner':'🌙 Dîner'}</div>${state.meals[mealSlot].length?state.meals[mealSlot].map((i,idx)=>`<div class="row"><div><b>${esc(i.name)}${i.qty?` <span class="muted" style="font-size:12px">(${i.qty}g)</span>`:''}</b><div class="muted" style="font-size:11px">${i.macros.p}g P · ${i.macros.c}g G · ${i.macros.f}g L</div></div><div><b style="color:#a5b4fc">${i.calories} kcal</b> <button class="btn red" style="padding:5px 8px" onclick="delMeal('${mealSlot}',${idx})">✕</button></div></div>`).join(''):'<div class="muted" style="font-size:13px">Aucun aliment.</div>'}</div></div>`}
function filterFoods(){let q=($('search')?.value||'').toLowerCase(),cat=$('cat')?.value||'Toutes catégories';let arr=Object.keys(FOOD_DB).filter(k=>(cat==='Toutes catégories'||(FOOD_DB[k].cat||'Divers')===cat)&&(!q||k.toLowerCase().includes(q))).slice(0,60);$('foods').innerHTML=arr.map(k=>`<div class="item" onclick="selectFood('${encodeURIComponent(k)}')"><span>${esc(k)}</span><span class="muted">${FOOD_DB[k].cal} kcal/100g</span></div>`).join('')||'<div class="item muted">Aucun résultat</div>';}
let selectedFood='';function selectFood(k){selectedFood=decodeURIComponent(k);$('search').value=selectedFood;filterFoods();}
function addFood(){let name=selectedFood||$('search').value;if(!FOOD_DB[name])return alert('Sélectionne un aliment dans la liste');let qty=+$('qty').value;if(!qty)return;let f=FOOD_DB[name],r=qty/100;state.meals[mealSlot].push({name,qty,calories:Math.round(f.cal*r),macros:{p:Math.round((f.p||0)*r),c:Math.round((f.c||0)*r),f:Math.round((f.f||0)*r)}});selectedFood='';updateHist();save();render();}
function addManual(){let cal=+$('mc').value;if(!cal)return;state.meals[mealSlot].push({name:$('mn').value||'Aliment',calories:cal,macros:{p:+$('mp').value||0,c:+$('mg').value||0,f:+$('ml').value||0}});updateHist();save();render();}
function delMeal(slot,idx){state.meals[slot].splice(idx,1);updateHist();save();render();}
function pageSport(){let w=+state.profile.weight||70,total=sportBurn();return `<div class="fade">${total?`<div class="alert">✅ ${total} kcal brûlées aujourd'hui 🔥</div>`:''}<div class="card"><label>Activité</label><select id="sp" class="select">${SPORT_DB.map((s,i)=>`<option value="${i}">${s.icon||''} ${esc(s.name)} · ${s.met} MET</option>`).join('')}</select><label>Durée</label><input id="mins" class="input" type="number" placeholder="30"><div class="muted" style="font-size:12px;margin:10px 0">Formule MET avec ton poids : ${w} kg.</div><button class="btn green" style="width:100%" onclick="addSport()">＋ Ajouter cette activité</button></div><div class="card"><div class="st">Sport du jour</div>${state.sport.length?state.sport.map((s,i)=>`<div class="row"><div><b>${s.icon||''} ${esc(s.name)}</b><div class="muted" style="font-size:11px">${s.minutes} min · MET ${s.met}</div></div><div><b style="color:#22c55e">-${s.burned} kcal</b> <button class="btn red" style="padding:5px 8px" onclick="delSport(${i})">✕</button></div></div>`).join(''):'<div class="muted" style="font-size:13px">Aucune activité.</div>'}</div></div>`}
function addSport(){let o=SPORT_DB[+$('sp').value],m=+$('mins').value,w=+state.profile.weight||70;if(!m)return;state.sport.push({...o,minutes:m,burned:Math.round((o.met/60)*w*m)});updateHist();save();render();}
function delSport(i){state.sport.splice(i,1);updateHist();save();render();}
function pageWeight(){return `<div class="fade"><div class="card"><div class="st">Enregistrer mon poids</div><label>Poids</label><input id="nw" class="input" type="number" step="0.1" placeholder="75.5"><button class="btn green" style="width:100%;margin-top:10px" onclick="addWeight()">💾 Enregistrer</button></div><div class="card"><div class="st">Courbe de poids</div>${simpleChart(state.weights,'weight','#22c55e')}</div><div class="card"><div class="st">Historique</div>${state.weights.slice().reverse().map((x,i)=>`<div class="row"><span class="muted">${x.date}</span><b>${x.weight} kg</b></div>`).join('')||'<div class="muted" style="font-size:13px">Aucun poids.</div>'}</div></div>`}
function addWeight(){let v=+$('nw').value;if(!v)return;let t=today();state.weights=state.weights.filter(x=>x.date!==t);state.weights.push({date:t,weight:v});state.weights.sort((a,b)=>a.date.localeCompare(b.date));state.profile.weight=String(v);save();render();}
function pageProfile(){let p=state.profile,td=tdee(),b=bmi();return `<div class="fade"><div class="card"><div class="st">Mes informations</div><div class="grid2"><div><label>Poids</label><input id="pr_weight" class="input" type="number" value="${esc(p.weight)}"></div><div><label>Taille</label><input id="pr_height" class="input" type="number" value="${esc(p.height)}"></div><div><label>Âge</label><input id="pr_age" class="input" type="number" value="${esc(p.age)}"></div><div><label>Sexe</label><select id="pr_sex" class="select"><option value="H" ${p.sex==='H'?'selected':''}>Homme</option><option value="F" ${p.sex==='F'?'selected':''}>Femme</option></select></div></div><label>Niveau d'activité</label><select id="pr_activity" class="select"><option value="1.2">Sédentaire</option><option value="1.375">Légèrement actif</option><option value="1.55" ${p.activity==='1.55'?'selected':''}>Modérément actif</option><option value="1.725">Très actif</option><option value="1.9">Extrêmement actif</option></select></div><div class="card"><div class="st">Objectif calorique</div><label>Déficit journalier</label><input id="pr_deficit" class="input" type="number" value="${esc(p.deficit)}"><label>Objectif manuel</label><input id="pr_goal" class="input" type="number" value="${esc(p.goalCal)}"><button class="btn green" style="width:100%;margin-top:10px" onclick="saveProfile()">💾 Sauvegarder</button></div>${td?`<div class="card"><div class="st">Mes données calculées</div><div class="grid2"><div class="pill"><div class="muted" style="font-size:10px">TDEE</div><b style="font-size:22px;color:#a5b4fc">${td}</b><div class="muted" style="font-size:10px">kcal</div></div><div class="pill"><div class="muted" style="font-size:10px">Objectif</div><b style="font-size:22px;color:#22c55e">${derived().goal}</b><div class="muted" style="font-size:10px">kcal</div></div></div></div>`:''}${b?`<div class="card"><div class="st">IMC</div><div style="font-size:44px;font-weight:900;color:#22c55e">${b}</div></div>`:''}<div class="card"><div class="st">📱 Installer sur iPhone</div><div style="font-size:13px;line-height:1.7">1. Ouvre dans Safari<br>2. Bouton Partager ↑<br>3. Ajouter à l'écran d'accueil<br>4. Nom : NutriTrack</div></div></div>`}
function saveProfile(){['weight','height','age','deficit'].forEach(k=>state.profile[k]=$('pr_'+k).value);state.profile.sex=$('pr_sex').value;state.profile.activity=$('pr_activity').value;state.profile.goalCal=$('pr_goal').value;save();render();}
function updateHist(){let d=derived();state.hist=state.hist.filter(x=>x.date!==today());state.hist.push({date:today(),consumed:d.cons,burned:d.burn,net:d.net});state.hist.sort((a,b)=>a.date.localeCompare(b.date));state.hist=state.hist.slice(-30);}
function go(t){state.tab=t;render();setTimeout(()=>{if(t==='meals')filterFoods()},0)}
function render(){let content={dash:pageDash,meals:pageMeals,sport:pageSport,weight:pageWeight,profile:pageProfile}[state.tab]();$('app').innerHTML=header()+content+nav();if(state.tab==='meals')setTimeout(filterFoods,0);}
load(); updateHist(); save(); render();
</script>
</body>
</html>
